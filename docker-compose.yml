version: "3.9"

# ── VetGPT Docker Compose ─────────────────────────────────────────────────────
#
# Dev:   docker compose up
# Prod:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Services:
#   api      — FastAPI backend
#   redis    — Rate limiting + caching (production)
#   caddy    — Reverse proxy with auto-HTTPS (production)

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vetgpt_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vetgpt
      POSTGRES_USER:     vetgpt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    
  # ── Telegram Bot ────────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: vetgpt_telegram
    restart: unless-stopped
    command: ["python", "-m", "bots.telegram_bot"]
    depends_on:
      api:
        condition: service_started
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_WEBHOOK_PORT=${TELEGRAM_WEBHOOK_PORT:-8443}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}
      - VETGPT_API_URL=http://api:8000
      - BOT_API_KEY=${BOT_API_KEY}
    ports:
      - "8443:8443"
    profiles: ["production", "bots"]

volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vetgpt"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: vetgpt_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://vetgpt:${POSTGRES_PASSWORD:-changeme}@db:5432/vetgpt
      - CHROMA_DB_PATH=./data/chroma_db
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_PREMIUM_MONTHLY=${STRIPE_PRICE_PREMIUM_MONTHLY}
      - STRIPE_PRICE_CLINIC_MONTHLY=${STRIPE_PRICE_CLINIC_MONTHLY}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - ENVIRONMENT=production
      - DEBUG=false
    volumes:
      - vetgpt_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis (rate limiting + session cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vetgpt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Caddy (reverse proxy + auto HTTPS) ───────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: vetgpt_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    profiles:
      - production   # only runs with: docker compose --profile production up


volumes:
  vetgpt_data:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config: